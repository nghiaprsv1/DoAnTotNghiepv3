# Render Blueprint — TripMate backend (NestJS) + PostgreSQL managed.
# Deploy: Render Dashboard → New → Blueprint → trỏ tới repo này.
# Sau khi tạo, set thủ công các secret đánh dấu "sync: false" trong dashboard.
services:
  - type: web
    name: tripmate-api
    runtime: node
    plan: starter # free tier 512MB RAM đủ cho NestJS + Gemini (KHÔNG dùng LLM local)
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/docs
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      # ── Database: tự nối từ Postgres bên dưới ──
      - key: DB_HOST
        fromDatabase:
          name: tripmate-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: tripmate-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: tripmate-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: tripmate-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: tripmate-db
          property: database
      - key: DB_SSL
        value: "true"
      - key: DB_SYNCHRONIZE
        value: "true" # tạo bảng tự động lần đầu; cân nhắc tắt + migration sau
      - key: DB_LOGGING
        value: "false"
      # ── JWT: tự sinh ngẫu nhiên ──
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: "10"
      # ── CORS: điền domain Vercel sau khi có (vd https://tripmate.vercel.app) ──
      - key: CORS_ORIGINS
        sync: false
      # ── AI: chat v1 dùng Gemini; RAG v2 dùng OpenAI (proxy v98store) ──
      - key: LLM_PROVIDER
        value: gemini
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      # RAG v2 (chatbot /chatbot-v2) chạy OpenAI — embedding/cosine khớp 1536d.
      - key: RAGV2_LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false # nhập tay trong Dashboard (không commit key vào Git)
      - key: OPENAI_BASE_URL
        value: https://v98store.com/v1
      - key: RAGV2_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: RAGV2_CHAT_MODEL
        value: gpt-4o-mini
      # Rerank: dùng LLM thay cross-encoder local — Render free 512MB RAM KHÔNG
      # đủ nạp model ONNX (~250-400MB). LLM rerank không tốn RAM (gọi API chấm điểm).
      - key: RAGV2_RERANK_PROVIDER
        value: llm
      # ── Firebase Storage (service account JSON) ──
      - key: FIREBASE_STORAGE_BUCKET
        value: tripmate-e062f.firebasestorage.app
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      # ── Cloudinary (lưu ảnh — miễn phí, không cần thẻ; ưu tiên hơn Firebase) ──
      - key: CLOUDINARY_URL
        sync: false # cloudinary://<key>:<secret>@<cloud_name> — nhập tay trong Dashboard
      - key: CLOUDINARY_FOLDER
        value: tripmate
      # ── SePay (thanh toán) ──
      - key: SEPAY_BANK_ACCOUNT
        sync: false
      - key: SEPAY_BANK_NAME
        sync: false
      - key: SEPAY_ACCOUNT_HOLDER
        sync: false
      - key: SEPAY_WEBHOOK_TOKEN
        sync: false
      - key: UPLOAD_DIR
        value: uploads

databases:
  - name: tripmate-db
    plan: free # Postgres free 1GB (lưu ý: free DB hết hạn sau 90 ngày)
    databaseName: tripmate
    user: tripmate
